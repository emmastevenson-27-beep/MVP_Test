<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restore — Testing Phase Survey</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #16213E;
    --navy-deep: #0F172E;
    --ice: #BFE6EA;
    --ice-deep: #6FBFCB;
    --bright: #2F6FED;
    --gold: #F2B94D;
    --ink: #14161C;
    --gray: #8A8F98;
    --page: #F5F5F5;
    --card: #FFFFFF;
    --line: #E3E6EC;
    --radius: 16px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--page);
    color: var(--ink);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  h1, h2, .brand-word { font-family: 'Inter', sans-serif; }
  .app { max-width: 720px; margin: 0 auto; padding: 0 20px 70px; }

  /* ---- Hero / brand header ---- */
  .hero {
    background: linear-gradient(160deg, var(--navy) 0%, var(--navy-deep) 100%);
    color: #fff;
    padding: 36px 24px 28px;
    border-radius: 0 0 22px 22px;
    margin: 0 0 22px;
    text-align: center;
  }
  .brand-lockup { display: flex; align-items: center; justify-content: center; gap: 14px; margin-bottom: 10px; }
  .logo-mark { width: 58px; height: 58px; flex-shrink: 0; position: relative; }
  .logo-mark svg { width: 100%; height: 100%; }
  .brand-word { font-family: 'Inter', sans-serif; font-size: 44px; font-weight: 800; letter-spacing: -0.01em; line-height: 1; margin: 0; }
  .tagline { font-size: 13px; color: var(--ice); font-weight: 500; margin: 0; }

  .tabs {
    display: flex; gap: 6px; background: var(--card);
    border: 1px solid var(--line); border-radius: 12px; padding: 5px;
    margin-bottom: 22px; overflow-x: auto;
  }
  .tab {
    flex: 1; min-width: max-content; text-align: center;
    padding: 9px 12px; border-radius: 8px; font-size: 13px; font-weight: 600;
    color: var(--gray); cursor: pointer; user-select: none; white-space: nowrap;
    transition: background 0.15s, color 0.15s;
  }
  .tab.active { background: var(--navy); color: #fff; }
  .tab:hover:not(.active) { background: var(--page); }

  .panel { display: none; }
  .panel.active { display: block; }

  /* ---- Gate ---- */
  .gate {
    background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 26px 24px; text-align: center;
  }
  .gate h2 { font-size: 19px; margin: 0 0 8px; color: var(--navy); }
  .gate p.desc { font-size: 13.5px; color: var(--gray); margin: 0 0 20px; line-height: 1.5; }
  .gate label { display: block; text-align: left; font-size: 12px; font-weight: 600; color: var(--gray); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }
  .gate input {
    width: 100%; padding: 11px 12px; font-size: 14px;
    border: 1px solid var(--line); border-radius: 9px; font-family: inherit; margin-bottom: 6px;
  }
  .gate .hint { font-size: 12px; color: var(--gray); text-align: left; margin-bottom: 20px; }

  /* ---- Progress ---- */
  .progress-row { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; }
  .ring { position: relative; width: 46px; height: 46px; border-radius: 50%; flex-shrink: 0; }
  .ring .fill { width: 100%; height: 100%; border-radius: 50%; background: conic-gradient(var(--bright) var(--deg,0deg), #E3E6EC 0deg); }
  .ring .hole { position: absolute; top: 4px; left: 4px; width: 38px; height: 38px; border-radius: 50%; background: var(--card); display: flex; align-items: center; justify-content: center; font-size: 10.5px; font-weight: 700; color: var(--navy); font-family: 'Inter', sans-serif; }
  .progress-meta { flex: 1; }
  .progress-meta .group-title { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 15.5px; color: var(--navy); margin: 0; }
  .progress-meta .group-note { font-size: 12px; color: var(--gray); margin: 2px 0 0; }
  .progress-bar-track { height: 5px; border-radius: 3px; background: var(--line); margin-top: 10px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--ice-deep), var(--bright)); border-radius: 3px; transition: width 0.25s ease; }

  /* ---- Slide / question card ---- */
  .slide {
    background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 22px 22px 8px;
  }
  .q { margin-bottom: 22px; }
  .q .qlabel { font-size: 14.5px; font-weight: 500; margin-bottom: 10px; line-height: 1.4; }

  .options { display: flex; flex-direction: column; gap: 7px; }
  .opt {
    display: flex; align-items: center; gap: 9px; padding: 9px 11px;
    border: 1px solid var(--line); border-radius: 9px; cursor: pointer;
    font-size: 13.5px; transition: border-color 0.15s, background 0.15s;
  }
  .opt:hover { border-color: var(--ice-deep); }
  .opt input { accent-color: var(--navy); width: 15px; height: 15px; flex-shrink: 0; }
  .opt.checked { border-color: var(--navy); background: #F2F5FC; }

  .other-input {
    margin-top: 6px; margin-left: 24px; width: calc(100% - 24px);
    padding: 7px 10px; font-size: 13px; border: 1px solid var(--line);
    border-radius: 6px; font-family: inherit; display: none;
  }
  .other-input.show { display: block; }

  textarea {
    width: 100%; padding: 10px 12px; font-size: 13.5px; font-family: inherit;
    border: 1px solid var(--line); border-radius: 9px; resize: vertical; min-height: 64px;
  }

  .scale { display: flex; gap: 6px; }
  .scale .sc {
    flex: 1; text-align: center; padding: 10px 4px; border: 1px solid var(--line);
    border-radius: 9px; cursor: pointer; font-size: 12px; line-height: 1.3;
  }
  .scale .sc .num { display: block; font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 700; margin-bottom: 3px; color: var(--navy); }
  .scale .sc .lbl { font-size: 9.5px; color: var(--gray); display: block; }
  .scale .sc:hover { border-color: var(--ice-deep); }
  .scale .sc.checked { border-color: var(--gold); background: #FDF6E5; }
  .scale .sc.checked .num { color: var(--ink); }

  .nav-row { display: flex; align-items: center; gap: 12px; margin: 20px 0 6px; }
  button.primary {
    background: var(--navy); color: #fff; border: none; border-radius: 10px;
    padding: 13px 24px; font-size: 14px; font-weight: 600; cursor: pointer;
    font-family: inherit; flex: 1;
  }
  button.primary:hover { background: var(--navy-deep); }
  button.ghost {
    background: #fff; color: var(--navy); border: 1px solid var(--line); border-radius: 10px;
    padding: 13px 20px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit;
  }
  button.ghost:hover { border-color: var(--navy); }
  .status { text-align: center; font-size: 13px; color: var(--ice-deep); font-weight: 600; margin-top: 10px; min-height: 18px; }
  .status.err { color: #B4483B; }
  .status.ok { color: #2F8F5B; }

  .done-card {
    background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 40px 24px; text-align: center;
  }
  .done-card .check { width: 54px; height: 54px; border-radius: 50%; background: var(--gold); margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; }
  .done-card h2 { color: var(--navy); margin: 0 0 8px; }
  .done-card p { color: var(--gray); font-size: 13.5px; margin: 0; }

  .footer-note { text-align: center; font-size: 12px; color: var(--gray); margin-top: 30px; }
</style>
</head>

const SECTION_ORDER = ["onboarding","midprogram","endprogram"];
const MAX_PER_SLIDE = 5;

// Chunk each group into slides of at most MAX_PER_SLIDE questions
function buildSlides(cfg) {
  const slides = [];
  cfg.groups.forEach(group => {
    const qs = group.questions;
    for (let i = 0; i < qs.length; i += MAX_PER_SLIDE) {
      const chunk = qs.slice(i, i + MAX_PER_SLIDE);
      const isContinuation = i > 0;
      slides.push({
        title: group.title + (isContinuation ? " (cont.)" : ""),
        note: isContinuation ? null : group.note,
        questions: chunk
      });
    }
  });
  return slides;
}

// ---------- Rendering helpers ----------
function el(tag, attrs = {}, children = []) {
  const node = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs)) {
    if (k === 'class') node.className = v;
    else node.setAttribute(k, v);
  }
  (Array.isArray(children) ? children : [children]).forEach(c => {
    if (c) node.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  });
  return node;
}

function renderScale(q) {
  const labels = q.scaleLabels || AGREE_SCALE;
  const wrap = el('div', { class: 'scale', 'data-qid': q.id });
  for (let i = 1; i <= 5; i++) {
    const sc = el('div', { class: 'sc', 'data-val': i }, [
      el('span', { class: 'num' }, String(i)),
      el('span', { class: 'lbl' }, labels[i-1])
    ]);
    sc.addEventListener('click', () => {
      wrap.querySelectorAll('.sc').forEach(n => n.classList.remove('checked'));
      sc.classList.add('checked');
      wrap.dataset.value = i;
    });
    wrap.appendChild(sc);
  }
  return wrap;
}

function renderChoice(q, multi) {
  const wrap = el('div', { class: 'options', 'data-qid': q.id, 'data-multi': multi ? '1' : '0' });
  q.options.forEach(opt => {
    const inputType = multi ? 'checkbox' : 'radio';
    const input = el('input', { type: inputType, name: q.id + '_' + Math.random().toString(36).slice(2,7) });
    const row = el('label', { class: 'opt' }, [input, document.createTextNode(opt)]);
    let otherBox = null;
    if (opt === 'Other') {
      otherBox = el('input', { class: 'other-input', type: 'text', placeholder: 'Please specify' });
    }
    input.addEventListener('change', () => {
      if (!multi) wrap.querySelectorAll('.opt').forEach(n => n.classList.remove('checked'));
      row.classList.toggle('checked', input.checked);
      if (otherBox) otherBox.classList.toggle('show', input.checked);
    });
    wrap.appendChild(row);
    if (otherBox) wrap.appendChild(otherBox);
  });
  return wrap;
}

function renderQuestion(q) {
  const box = el('div', { class: 'q', 'data-qid': q.id, 'data-type': q.type });
  box.appendChild(el('div', { class: 'qlabel' }, q.label));
  if (q.type === 'text') {
    box.appendChild(el('textarea', { rows: '2', placeholder: 'Type your answer…' }));
  } else if (q.type === 'radio') {
    box.appendChild(renderChoice(q, false));
  } else if (q.type === 'checkbox') {
    box.appendChild(renderChoice(q, true));
  } else if (q.type === 'scale') {
    box.appendChild(renderScale(q));
  }
  return box;
}

function collectAnswer(qBox, q) {
  if (q.type === 'text') return qBox.querySelector('textarea').value.trim();
  if (q.type === 'scale') return qBox.querySelector('.scale').dataset.value || '';
  if (q.type === 'radio') {
    const checked = qBox.querySelector('input[type=radio]:checked');
    if (!checked) return '';
    const row = checked.closest('.opt');
    const label = row.textContent.trim();
    if (label === 'Other') {
      const other = qBox.querySelector('.other-input');
      return other && other.value.trim() ? `Other: ${other.value.trim()}` : 'Other';
    }
    return label;
  }
  if (q.type === 'checkbox') {
    const checks = qBox.querySelectorAll('input[type=checkbox]:checked');
    const vals = [];
    checks.forEach(c => {
      const row = c.closest('.opt');
      let label = row.textContent.trim();
      if (label === 'Other') {
        const other = row.nextElementSibling;
        label = other && other.value.trim() ? `Other: ${other.value.trim()}` : 'Other';
      }
      vals.push(label);
    });
    return vals.join(' | ');
  }
  return '';
}

// ---------- Section panel (wizard) ----------
function buildSectionPanel(sectionKey) {
  const cfg = CONFIGS[sectionKey];
  const slides = buildSlides(cfg);
  const panel = el('div', { class: 'panel', id: 'panel-' + sectionKey });

  let state = { started: false, current: 0, pid: '', done: false, answers: {} };

  function render() {
    panel.innerHTML = '';

    if (state.done) {
      const doneCard = el('div', { class: 'done-card' });
      const check = el('div', { class: 'check' }, el('span', {}, '✓'));
      check.querySelector('span').style.cssText = 'color:#16213E;font-size:26px;font-weight:800;';
      doneCard.appendChild(check);
      doneCard.appendChild(el('h2', {}, 'Thanks for sharing!'));
      doneCard.appendChild(el('p', {}, 'Your response has been saved. You can close this or switch tabs whenever you\'re ready.'));
      panel.appendChild(doneCard);
      return;
    }

    if (!state.started) {
      const gate = el('div', { class: 'gate' });
      gate.appendChild(el('h2', {}, cfg.title));
      gate.appendChild(el('p', { class: 'desc' }, cfg.subtitle + ' — this will take about 3-5 minutes, in short bite-sized steps.'));
      gate.appendChild(el('label', {}, 'Your name or email'));
      const input = el('input', { type: 'text', placeholder: 'e.g. jane@email.com', id: 'pid-input-' + sectionKey });
      gate.appendChild(input);
      gate.appendChild(el('div', { class: 'hint' }, 'Use the same name or email each time so we can match up your Getting Started, Check-In, and Wrap-Up answers.'));
      const startBtn = el('button', { class: 'primary' }, 'Start');
      gate.appendChild(startBtn);
      startBtn.addEventListener('click', () => {
        const val = input.value.trim();
        if (!val) { input.style.borderColor = '#B4483B'; return; }
        state.pid = val;
        state.started = true;
        state.current = 0;
        render();
      });
      panel.appendChild(gate);
      return;
    }

    const slideIdx = state.current;
    const slide = slides[slideIdx];
    const total = slides.length;
    const pct = Math.round(((slideIdx) / total) * 100);

    const progressRow = el('div', { class: 'progress-row' });
    const ring = el('div', { class: 'ring' });
    const fill = el('div', { class: 'fill' });
    fill.style.setProperty('--deg', (pct * 3.6) + 'deg');
    const hole = el('div', { class: 'hole' }, `${slideIdx+1}/${total}`);
    ring.appendChild(fill); ring.appendChild(hole);
    const meta = el('div', { class: 'progress-meta' });
    meta.appendChild(el('p', { class: 'group-title' }, slide.title));
    if (slide.note) meta.appendChild(el('p', { class: 'group-note' }, slide.note));
    progressRow.appendChild(ring);
    progressRow.appendChild(meta);
    panel.appendChild(progressRow);

    const barTrack = el('div', { class: 'progress-bar-track' });
    const barFill = el('div', { class: 'progress-bar-fill' });
    barFill.style.width = Math.round(((slideIdx+1)/total)*100) + '%';
    barTrack.appendChild(barFill);
    panel.appendChild(barTrack);

    const slideCard = el('div', { class: 'slide' });
    slide.questions.forEach(q => {
      const qBox = renderQuestion(q);
      // restore previous answer selection visually if navigating back
      slideCard.appendChild(qBox);
    });
    panel.appendChild(slideCard);

    const navRow = el('div', { class: 'nav-row' });
    if (slideIdx > 0) {
      const backBtn = el('button', { class: 'ghost' }, 'Back');
      backBtn.addEventListener('click', () => { saveCurrentSlideAnswers(slideCard, slide); state.current -= 1; render(); });
      navRow.appendChild(backBtn);
    }
    const isLast = slideIdx === total - 1;
    const nextBtn = el('button', { class: 'primary' }, isLast ? 'Submit response' : 'Next');
    navRow.appendChild(nextBtn);
    panel.appendChild(navRow);

    const status = el('div', { class: 'status' }, '');
    panel.appendChild(status);

    nextBtn.addEventListener('click', async () => {
      saveCurrentSlideAnswers(slideCard, slide);
      if (!isLast) {
        state.current += 1;
        render();
        return;
      }
      nextBtn.disabled = true;
      status.textContent = 'Saving…';
      status.className = 'status';
      const payload = {
        participantId: state.pid,
        section: sectionKey,
        submittedAt: new Date().toISOString(),
        answers: state.answers
      };
      try {
        const key = `response:${sectionKey}:${state.pid}`;
        const result = await window.storage.set(key, JSON.stringify(payload), true);
        if (!result) throw new Error('no result');
        state.done = true;
        render();
      } catch (err) {
        console.error(err);
        status.textContent = 'Could not save — please try again.';
        status.className = 'status err';
        nextBtn.disabled = false;
      }
    });
  }

  function saveCurrentSlideAnswers(slideCard, slide) {
    slide.questions.forEach(q => {
      const qBox = slideCard.querySelector(`.q[data-qid="${q.id}"]`);
      if (qBox) state.answers[q.id] = collectAnswer(qBox, q);
    });
  }

  render();
  return panel;
}

// ---------- Init ----------
const panelsRoot = document.getElementById('panels');
SECTION_ORDER.forEach(key => panelsRoot.appendChild(buildSectionPanel(key)));
document.getElementById('panel-onboarding').classList.add('active');

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
  });
});
</script>
</body>
